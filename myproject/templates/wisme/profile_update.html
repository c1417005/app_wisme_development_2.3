{% extends "base/wisme_base.html" %}
{% block title %}プロフィール編集 — Wisme{% endblock %}

{% block body %}

<div class="max-w-md mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'wisme:profile' %}" class="text-stone-400 hover:text-stone-700 transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-xl font-semibold text-stone-800">プロフィール編集</h1>
    </div>

    <form method="POST" enctype="multipart/form-data"
          class="bg-white rounded-2xl border border-stone-100 shadow-sm p-6 space-y-5">
        {% csrf_token %}

        {% for field in form %}
        <div class="space-y-1">
            <label class="block text-sm font-medium text-stone-600">{{ field.label }}</label>
            <div class="[&_input]:w-full [&_input]:border [&_input]:border-stone-200 [&_input]:rounded-lg [&_input]:px-3 [&_input]:py-2 [&_input]:text-sm [&_input]:bg-[#FAF8F4] [&_input]:outline-none [&_input]:focus:border-stone-400
                        [&_input[type=file]]:border-0 [&_input[type=file]]:p-0 [&_input[type=file]]:bg-transparent">
                {{ field }}
            </div>
            {% if field.errors %}
            <ul class="text-xs text-red-500 space-y-0.5">
                {% for e in field.errors %}<li>{{ e }}</li>{% endfor %}
            </ul>
            {% endif %}
        </div>
        {% endfor %}

        <button type="submit"
                class="w-full bg-stone-800 text-white py-2.5 rounded-lg hover:bg-stone-700 transition-colors font-medium text-sm"
                onclick="showToast('プロフィールを更新しました ✓')">
            保存する
        </button>
    </form>
</div>

{% endblock %}

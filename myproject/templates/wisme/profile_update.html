{% extends "base/wisme_base.html" %}
{% block body %}

<h2>プロフィール編集</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
        <div class="field_container">
            {{ field.label_tag }}
            {{ field }}
            {% if field.errors %}
                <ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit">保存</button>
</form>

<a href="{% url 'wisme:profile' %}">キャンセル</a>

{% endblock %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wisme{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { paper: '#FAF8F4', ink: '#2C2C2C' },
                    fontFamily: { sans: ['Hiragino Kaku Gothic Pro', 'Meiryo', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/wisme/css/style.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-[#FAF8F4] text-[#2C2C2C] min-h-screen flex flex-col">

    <header class="border-b border-stone-200 bg-white/90 backdrop-blur-sm sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="{% url 'wisme:index' %}" class="text-lg font-semibold tracking-widest text-stone-800">Wisme</a>
            <nav class="flex items-center gap-5 text-sm text-stone-500">
                {% if user.is_authenticated %}
                    <a href="{% url 'wisme:page_create' %}" class="flex items-center gap-1 hover:text-stone-900 transition-colors">
                        <i data-lucide="book-plus" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">新しいメモ</span>
                    </a>
                    <a href="{% url 'wisme:page_list' %}" class="flex items-center gap-1 hover:text-stone-900 transition-colors">
                        <i data-lucide="library" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">メモ一覧</span>
                    </a>
                    <a href="{% url 'wisme:word_list' %}" class="flex items-center gap-1 hover:text-stone-900 transition-colors">
                        <i data-lucide="notebook-text" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">単語帳</span>
                    </a>
                    <a href="{% url 'wisme:flashcard' %}" class="flex items-center gap-1 hover:text-stone-900 transition-colors">
                        <i data-lucide="layers" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">カード</span>
                    </a>
                    <a href="{% url 'wisme:profile' %}" class="flex items-center gap-1 hover:text-stone-900 transition-colors">
                        <i data-lucide="user-circle" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">{{ user.display_name|default:user.username }}</span>
                    </a>
                    <a href="{% url 'account_logout' %}" class="text-stone-400 hover:text-stone-700 transition-colors text-xs">ログアウト</a>
                {% else %}
                    <a href="{% url 'account_login' %}" class="hover:text-stone-900 transition-colors">ログイン</a>
                    <a href="{% url 'account_signup' %}" class="bg-stone-800 text-white px-3 py-1.5 rounded-md text-xs hover:bg-stone-700 transition-colors">新規登録</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-8">
        {% block body %}{% endblock %}
    </main>

    <!-- Toast notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-stone-800 text-white text-sm px-4 py-3 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2">
        <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
        <span id="toast-message"></span>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>

    <script>
    function showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-message').textContent = msg;
        t.classList.remove('opacity-0');
        t.classList.add('opacity-100');
        setTimeout(() => {
            t.classList.remove('opacity-100');
            t.classList.add('opacity-0');
        }, 3000);
    }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
